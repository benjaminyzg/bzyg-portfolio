name: Deploy React to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

# This tells GitHub to run all terminal commands inside your subfolder
defaults:
  run:
    working-directory: benjaminyzg.github.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          # This tells the cacher where to find your lockfile
          cache-dependency-path: benjaminyzg.github.io/pnpm-lock.yaml

      - name: Install and Build
        run: |
          pnpm install
          pnpm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Points directly to the build output folder inside your subfolder
          path: './benjaminyzg.github.io/dist' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
